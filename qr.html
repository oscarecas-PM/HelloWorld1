<!DOCTYPE html>
<html lang="en">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan to Play</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;

      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

      font-size: 1.5rem;
      color: #3d2b1a;
      margin-bottom: 8px;
    }

      color: #8a6a52;
      font-style: italic;
      margin-bottom: 32px;
    }

      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(60, 40, 20, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }
    canvas { display: block; }
    .url {
      font-size: 0.85rem;
      color: #8a6a52;
      letter-spacing: 0.3px;
    }
  </style>
</head>
