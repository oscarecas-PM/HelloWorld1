<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan to Play</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(150deg, #f7efe4 0%, #ecdcc8 100%);
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 1.5rem;
      color: #3d2b1a;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 0.95rem;
      color: #8a6a52;
      font-style: italic;
      margin-bottom: 32px;
    }
    .qr-box {
      background: #fff9f4;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(60, 40, 20, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }
    .qr-box img {
      display: block;
      width: 250px;
      height: 250px;
    }
    .url {
      font-size: 0.85rem;
      color: #8a6a52;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <h1>Let's Get to Know Each Other</h1>
  <p class="subtitle">Scan the code to join in</p>
  <div class="qr-box">
    <img
      src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://helloworld1-rho.vercel.app/"
      alt="QR Code to helloworld1-rho.vercel.app"
    />
  </div>
  <span class="url">helloworld1-rho.vercel.app</span>
</body>
</html>
